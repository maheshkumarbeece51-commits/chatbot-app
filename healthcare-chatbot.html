<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCare Assistant — Appointment Booking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0a9396;
    --teal-light: #94d2bd;
    --teal-dark: #005f73;
    --cream: #fefae0;
    --sand: #e9d8a6;
    --coral: #ee9b00;
    --dark: #001219;
    --white: #ffffff;
    --bubble-bot: #e8f4f5;
    --bubble-user: #0a9396;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #001219 0%, #005f73 50%, #0a9396 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
    animation: fadeDown 0.6s ease;
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    color: var(--cream);
    font-size: 1.8rem;
    letter-spacing: -0.5px;
  }

  .header p {
    color: var(--teal-light);
    font-size: 0.85rem;
    margin-top: 4px;
  }

  .chat-container {
    background: var(--white);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    height: 560px;
    animation: fadeUp 0.6s ease;
  }

  .chat-topbar {
    background: linear-gradient(90deg, var(--teal-dark), var(--teal));
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  .topbar-info h3 {
    color: var(--white);
    font-size: 0.95rem;
    font-weight: 600;
  }

  .topbar-info span {
    color: var(--teal-light);
    font-size: 0.75rem;
  }

  .online-dot {
    width: 8px; height: 8px;
    background: #52e06e;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f7fbfc;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--teal-light); border-radius: 10px; }

  .msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: msgIn 0.35s ease;
  }

  .msg.bot { flex-direction: row; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.875rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .bot .bubble {
    background: var(--bubble-bot);
    color: var(--dark);
    border-bottom-left-radius: 4px;
  }

  .user .bubble {
    background: var(--bubble-user);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }

  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0 4px 36px;
    animation: msgIn 0.4s ease;
  }

  .opt-btn {
    background: var(--white);
    border: 1.5px solid var(--teal);
    color: var(--teal-dark);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .opt-btn:hover {
    background: var(--teal);
    color: var(--white);
    transform: translateY(-1px);
  }

  .input-area {
    padding: 14px 16px;
    background: var(--white);
    border-top: 1px solid #e8f0f2;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .input-area input {
    flex: 1;
    border: 1.5px solid #d0e8ec;
    border-radius: 22px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border 0.2s;
    background: #f7fbfc;
    color: var(--dark);
  }

  .input-area input:focus { border-color: var(--teal); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--teal);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--teal-dark); transform: scale(1.05); }

  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .typing {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 14px;
    background: var(--bubble-bot);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--teal);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  .time-slot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 4px 0 4px 36px;
    animation: msgIn 0.4s ease;
  }

  .slot-btn {
    background: var(--white);
    border: 1.5px solid var(--teal-light);
    color: var(--teal-dark);
    padding: 7px 4px;
    border-radius: 10px;
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-weight: 500;
  }

  .slot-btn:hover {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
  }

  .confirm-card {
    background: linear-gradient(135deg, var(--teal-dark), var(--teal));
    color: white;
    border-radius: 14px;
    padding: 14px;
    font-size: 0.82rem;
    line-height: 1.7;
    max-width: 75%;
    animation: msgIn 0.35s ease;
    margin-left: 36px;
  }

  .confirm-card .label {
    font-size: 0.7rem;
    opacity: 0.75;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .confirm-card .value { font-weight: 600; margin-bottom: 6px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes bounce { 0%,60%,100%{ transform:translateY(0); } 30%{ transform:translateY(-6px); } }
  @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <h1>MediCare Assistant</h1>
    <p>AI-Powered Appointment Booking Demo</p>
  </div>

  <div class="chat-container">
    <div class="chat-topbar">
      <div class="avatar">🏥</div>
      <div class="topbar-info">
        <h3>MediCare Bot</h3>
        <span><span class="online-dot"></span>Online — Appointment Booking</span>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off"/>
      <button class="send-btn" onclick="handleSend()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const msgs = document.getElementById('messages');
  const input = document.getElementById('userInput');

  let state = {
    step: 'start',
    name: '', phone: '', doctor: '', date: '', time: '', reason: ''
  };

  const doctors = ['Dr. Priya Nair — General Physician', 'Dr. Arun Menon — Cardiologist', 'Dr. Sreeja Pillai — Dermatologist', 'Dr. Rajan Iyer — Orthopedic'];
  const dates = ['Mon Mar 30', 'Tue Mar 31', 'Wed Apr 1', 'Thu Apr 2'];
  const times = ['9:00 AM', '10:00 AM', '11:00 AM', '2:00 PM', '3:30 PM', '4:30 PM'];

  function addMsg(text, who) {
    const d = document.createElement('div');
    d.className = `msg ${who}`;
    if (who === 'bot') {
      d.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble">${text}</div>`;
    } else {
      d.innerHTML = `<div class="bubble">${text}</div><div class="msg-avatar">👤</div>`;
    }
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addOptions(opts, handler) {
    const d = document.createElement('div');
    d.className = 'options';
    opts.forEach(o => {
      const b = document.createElement('button');
      b.className = 'opt-btn';
      b.textContent = o;
      b.onclick = () => { clearOptions(); handler(o); };
      d.appendChild(b);
    });
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTimeSlots(handler) {
    const d = document.createElement('div');
    d.className = 'time-slot-grid';
    times.forEach(t => {
      const b = document.createElement('button');
      b.className = 'slot-btn';
      b.textContent = t;
      b.onclick = () => { clearOptions(); handler(t); };
      d.appendChild(b);
    });
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addConfirmCard() {
    const d = document.createElement('div');
    d.className = 'confirm-card';
    d.innerHTML = `
      <div class="label">Patient</div><div class="value">👤 ${state.name}</div>
      <div class="label">Doctor</div><div class="value">🩺 ${state.doctor.split('—')[0].trim()}</div>
      <div class="label">Date & Time</div><div class="value">📅 ${state.date} at ${state.time}</div>
      <div class="label">Reason</div><div class="value">📋 ${state.reason}</div>
      <div class="label">Confirmation</div><div class="value">✅ Booking Confirmed!</div>
    `;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function clearOptions() {
    document.querySelectorAll('.options, .time-slot-grid').forEach(e => e.remove());
  }

  function showTyping(cb, delay = 900) {
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.id = 'typing-indicator';
    d.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => { d.remove(); cb(); }, delay);
  }

  function botSay(text, cb, delay = 900) {
    showTyping(() => { addMsg(text, 'bot'); if (cb) cb(); }, delay);
  }

  function handleSend() {
    const val = input.value.trim();
    if (!val) return;
    input.value = '';
    clearOptions();
    addMsg(val, 'user');
    processInput(val);
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

  function processInput(val) {
    if (state.step === 'getName') {
      state.name = val;
      state.step = 'getPhone';
      botSay(`Nice to meet you, ${val}! 😊 Could you share your phone number for confirmation?`);
    } else if (state.step === 'getPhone') {
      state.phone = val;
      state.step = 'getReason';
      botSay(`Got it! What is the reason for your visit?`, () => {
        addOptions(['General Checkup', 'Follow-up Visit', 'New Symptom', 'Test Results'], (o) => {
          addMsg(o, 'user');
          state.reason = o;
          state.step = 'getDoctor';
          botSay('Please choose your preferred doctor:', () => {
            addOptions(doctors, (d) => {
              addMsg(d.split('—')[0].trim(), 'user');
              state.doctor = d;
              state.step = 'getDate';
              botSay('Select your preferred date:', () => {
                addOptions(dates, (dt) => {
                  addMsg(dt, 'user');
                  state.date = dt;
                  state.step = 'getTime';
                  botSay('Choose an available time slot:', () => {
                    addTimeSlots((t) => {
                      addMsg(t, 'user');
                      state.time = t;
                      state.step = 'confirm';
                      botSay('Please review your appointment details:', () => {
                        addConfirmCard();
                        setTimeout(() => {
                          botSay(`Your appointment is confirmed, ${state.name}! 🎉 A confirmation will be sent to <b>${state.phone}</b>. See you on ${state.date}!`, () => {
                            setTimeout(() => {
                              botSay('Is there anything else I can help you with?', () => {
                                addOptions(['Book Another Appointment', 'No, Thank You'], (o) => {
                                  addMsg(o, 'user');
                                  if (o === 'Book Another Appointment') {
                                    state = { step: 'getName', name:'', phone:'', doctor:'', date:'', time:'', reason:'' };
                                    botSay("Sure! Let's book another one. What's your name?");
                                  } else {
                                    botSay('Thank you for using MediCare Assistant. Take care and stay healthy! 💚');
                                  }
                                });
                              });
                            }, 600);
                          });
                        }, 400);
                      });
                    });
                  });
                });
              });
            });
          });
        });
      });
    }
  }

  // Start flow
  setTimeout(() => {
    botSay('👋 Hello! Welcome to <b>MediCare Clinic</b>. I\'m your appointment assistant!', () => {
      botSay('I can help you book a doctor\'s appointment in just a few steps. Ready?', () => {
        addOptions(['Yes, Book Appointment!', 'Tell me more'], (o) => {
          addMsg(o, 'user');
          if (o === 'Tell me more') {
            botSay('I help patients book appointments with our doctors quickly and easily. No waiting on hold! 😊 Shall we get started?', () => {
              addOptions(['Yes, Let\'s Go!'], (o2) => {
                addMsg(o2, 'user');
                state.step = 'getName';
                botSay("Great! First, may I have your full name?");
              });
            });
          } else {
            state.step = 'getName';
            botSay("Wonderful! First, may I have your full name?");
          }
        });
      });
    });
  }, 500);
</script>
</body>
</html>
